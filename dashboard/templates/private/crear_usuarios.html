{% load static %}
{% include 'private/header.html' %}

<form action="" method="post">
    {% csrf_token %}
    <!-- Form fields go here -->
    <div class="form-group">
        <label for="username">nombre del usuario</label>
        <input type="text" name="username" class="form-control" required placeholder="usuario">
    </div>
    <div class="form-group">
        <label for="email">Correo electronico: </label>
        <input type="email" name="email" class="form-control" required placeholder="email">
    </div>
    <div class="form-group">
        <label for="password">Password: </label>
        <input type="password" name="password" class="form-control" required placeholder="password">
    </div>
    <button class="btn btn-success">GUARDAD</button>
    <a href="{% url 'listar_usuarios' %}" class="btn btn-danger">CANCELAR</a>
</form>

{% include 'private/footer.html' %}
