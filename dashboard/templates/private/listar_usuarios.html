{% load static %}
{% include 'private/header.html' %}
<center><h1>listado de usuarios</h1></center>

<table class="table table-striped table-bordered">
    <thead>
        <tr>
            <th>Codigo</th>
            <th>Nombre</th>
            <th>Correo</th>
        </tr>
    </thead>
    <tbody>
        {% for usuario in usuarios %}
        <tr>
            <td>{{ usuario.id }}</td>
            <td>{{ usuario.username }}</td>
            <td>{{ usuario.email }}</td>
            <td> </td>
        </tr>
        {% endfor %}
    </tbody>

{% include 'private/footer.html' %}
