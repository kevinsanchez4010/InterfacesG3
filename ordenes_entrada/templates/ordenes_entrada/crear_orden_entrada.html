## Zy
{% load static %}
{% include "private/header2.html" %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<div class="container mt-4">
   <h3 class="text-primary mb-3"><i class="bi bi-pencil-square me-2"></i> Formulario de Registro</h3>
    <hr>
    <br>
    <form method="POST" action="">
        {% csrf_token %}
        <div class="mb-3">
           <label for=""><i class="bi bi-book text-primary me-1"></i> Nombre del producto:</label>
            <input type="text" name="nombreMateria" class="form-control shadow-sm" id="nombreMateria" required>
        </div>
        <div class="mb-3">
          <label for=""><i class="bi bi-currency-dollar text-success me-1"></i> Precio de la Materia:</label>
            <input type="number" name="precioMateria" class="form-control shadow-sm" id="precioMateria" required>
        </div>
        <div class="mb-3">
           <label for=""><i class="bi bi-star-fill text-warning me-1"></i> Créditos de la Materia:</label>
            <input type="number" class="form-control shadow-sm" id="creditosMateria" name="creditosMateria" required>
        </div>
        <div class="mb-3">
            <label for=""><i class="bi bi-people-fill text-info me-1"></i> Número de Estudiantes:</label>
            <input type="number" class="form-control shadow-sm" id="num_estudiantesMateria" name="num_estudiantesMateria" required>
        </div>
       <button type="submit" class="btn btn-success">
            <i class="bi bi-check-circle me-1"></i> Crear Materia
        </button>
        <a href="{% url 'listar_materias' %}" class="btn btn-outline-danger">
            <i class="bi bi-arrow-left-circle me-1"></i> Cancelar
        </a>
    </form>
</div>

{% include "private/footer.html" %}
