{% load static %}
{% include 'private/header.html' %}

<form action="" method="post">
    {% csrf_token %}
    <!-- Form fields go here -->
    <div class="form-group">
        <label for="nombre">Nombre del Lote</label>
        <input type="text" name="nombre" class="form-control" required placeholder="Nombre del lote">
    </div>
    <div class="form-group">
        <label for="descripcion">Descripción: </label>
        <textarea name="descripcion" class="form-control" required placeholder="Descripción del lote"></textarea>
    </div>
    <button type="submit" class="btn btn-primary">Crear Lote</button>
</form>
