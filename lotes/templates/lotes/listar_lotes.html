{% load static %}
{% include 'private/header.html' %}

<div class="main-panel">
    <div class="content-wrapper">
        <div class="row">
            <div class="col-12 grid-margin stretch-card">
                <div class="card shadow-sm border-0" style="border-radius: 12px; overflow: hidden;">
                    <div class="card-body p-4">
                        
                        <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-3">
                            <div>
                                <h4 class="font-weight-bold mb-1" style="color: #2c3e50; font-size: 1.4rem;">Listado de Lotes</h4>
                                <p class="text-muted small mb-0">Gestión de lotes registrados en el sistema</p>
                            </div>
                            <div class="d-flex align-items-center gap-3">
                                <span class="badge badge-light-primary px-3 py-2 font-weight-medium mr-2" style="font-size: 0.85rem; border-radius: 8px; background-color: #eef2f7; color: #3f51b5;">
                                    Total: <strong class="text-dark">{{ lotes|length }}</strong>
                                </span>
                                <a href="{% url 'crear_lote' %}" class="btn btn-primary px-4" style="border-radius: 8px; font-weight: 500; box-shadow: 0 4px 10px rgba(63, 81, 181, 0.25);">
                                    <i class="mdi mdi-plus-circle-outline mr-1"></i> Crear lote
                                </a>
                            </div>
                        </div>

                        {% if messages %}
                            {% for message in messages %}
                            <div class="alert alert-success alert-dismissible fade show mb-4" role="alert" style="border-radius: 8px;">
                                <i class="mdi mdi-check-circle-outline mr-2"></i> {{ message }}
                            </div>
                            {% endfor %}
                        {% endif %}

                        <div class="form-group mb-4">
                            <div class="input-group shadow-sm" style="border-radius: 8px; overflow: hidden;">
                                <div class="input-group-prepend">
                                    <span class="input-group-text bg-white border-right-0" style="border: 1px solid #e2e8f0;">
                                        <i class="mdi mdi-magnify text-muted" style="font-size: 1.2rem;"></i>
                                    </span>
                                </div>
                                <input
                                    id="filtroLotes"
                                    type="text"
                                    class="form-control border-left-0 py-4"
                                    style="border: 1px solid #e2e8f0; font-size: 0.95rem;"
                                    placeholder="Buscar por código, nombre o descripción..."
                                >
                            </div>
                        </div>
{% include 'private/footer.html' %}
