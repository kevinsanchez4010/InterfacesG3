{% load static %}
{% include 'private/header.html' %}

<form action="" method="post">
    {% csrf_token %}
    <div class="form-group">
        <label for="nombre">Nombre del Lote</label>
        <input type="text" name="nombre" value="{{ lote.nombre }}" class="form-control" required placeholder="Nombre del lote">
    </div>
    <div class="form-group">
        <label for="descripcion">Descripción: </label>
        <textarea name="descripcion" class="form-control" required placeholder="Descripción del lote">{{ lote.descripcion }}</textarea>
    </div>
    <button type="submit" class="btn btn-primary">Actualizar Lote</button>
</form>




{% include 'private/footer.html' %}
