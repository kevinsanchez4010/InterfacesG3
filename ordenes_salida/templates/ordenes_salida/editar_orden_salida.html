{% load static %}
{% include "private/header2.html" %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<div class="container mt-4">
   <h3 class="text-primary mb-3"><i class="bi bi-pencil-square me-2"></i> Modificar Orden de Salida - AKI Inventario</h3>
    <p class="text-muted mb-4">Actualice la salida de mercancía en el inventario de comidas, ropas y utensilios.</p>
    <hr>
    <form method="POST" action="">
        {% csrf_token %}
        <div class="mb-3">
           <label class="form-label"><i class="bi bi-building text-primary me-1"></i> Proveedor</label>
            <input type="text" name="proveedor" class="form-control shadow-sm" id="proveedor_edit" placeholder="Ej. Proveedor AKI S.A." required>
        </div>
        <div class="mb-3">
          <label class="form-label"><i class="bi bi-box-seam text-success me-1"></i> Producto</label>
            <input type="text" name="producto" class="form-control shadow-sm" id="producto_edit" placeholder="Ej. Arroz, Camiseta, Sartén" required>
        </div>
        <div class="mb-3">
           <label class="form-label"><i class="bi bi-tags text-warning me-1"></i> Categoría</label>
            <select name="categoria" id="categoria_edit" class="form-control shadow-sm" required>
                <option value="" disabled selected>Seleccione la categoría:</option>
                <option value="comidas">Comidas</option>
                <option value="ropas">Ropas</option>
                <option value="utensilios">Utensilios</option>
            </select>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label"><i class="bi bi-currency-dollar text-success me-1"></i> Precio unitario</label>
                <input type="number" step="0.01" min="0" name="precio_unitario" class="form-control shadow-sm" id="precio_unitario_edit" placeholder="0.00" required>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label"><i class="bi bi-stack text-info me-1"></i> Cantidad despachada</label>
                <input type="number" min="1" name="cantidad" class="form-control shadow-sm" id="cantidad_edit" placeholder="Ej. 20" required>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label"><i class="bi bi-calendar-event text-secondary me-1"></i> Fecha de salida</label>
            <input type="date" name="fecha_salida" class="form-control shadow-sm" id="fecha_salida_edit" required>
        </div>
        <div class="mb-3">
            <label class="form-label"><i class="bi bi-card-text text-muted me-1"></i> Observaciones </label>
            <textarea name="observaciones" class="form-control shadow-sm" id="observaciones_edit" rows="3" placeholder="Comentarios sobre la orden"></textarea>
        </div>
       <button type="submit" class="btn btn-success">
            <i class="bi bi-check-circle me-1"></i> Actualizar
        </button>
        <a href="#" class="btn btn-outline-danger">
            <i class="bi bi-arrow-left-circle me-1"></i> Cancelar
        </a>
    </form>
</div>

{% include "private/footer.html" %}
